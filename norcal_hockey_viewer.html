<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>California Hockey Stats DB</title>
<style>
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3352;
    --accent:#4f8ef7;--accent2:#f7934f;--text:#e8eaf6;--muted:#8890b0;
    --green:#4caf7d;--red:#f76f6f;--radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
  header h1{font-size:1.15rem;font-weight:700;letter-spacing:.02em;}
  header h1 span{color:var(--accent);}
  .tab-bar{display:flex;gap:4px;margin-left:auto;}
  .tab-btn{background:transparent;border:1px solid transparent;color:var(--muted);padding:7px 18px;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:500;transition:all .15s;}
  .tab-btn:hover{color:var(--text);background:var(--surface2);}
  .tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  main{max-width:1200px;margin:0 auto;padding:28px 20px;}
  .view{display:none;}.view.active{display:block;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;}
  .panel-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px;}
  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:24px;}
  label{display:flex;flex-direction:column;gap:5px;font-size:.82rem;color:var(--muted);}
  select,input[type=text]{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:6px;font-size:.92rem;min-width:180px;outline:none;transition:border-color .15s;}
  select:focus,input[type=text]:focus{border-color:var(--accent);}
  select option{background:var(--surface2);}
  .section-heading{display:flex;align-items:baseline;gap:12px;margin-bottom:16px;}
  .section-heading h2{font-size:1.3rem;font-weight:700;}
  .badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:.78rem;color:var(--muted);}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
  .table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);}
  table{width:100%;border-collapse:collapse;font-size:.88rem;}
  thead th{background:var(--surface2);color:var(--muted);padding:10px 14px;text-align:left;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;}
  thead th:hover{color:var(--text);}
  thead th.sort-asc::after{content:' ▲';font-size:.65rem;}
  thead th.sort-desc::after{content:' ▼';font-size:.65rem;}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--surface2);}
  tbody td{padding:10px 14px;white-space:nowrap;}
  td.player-link,.player-link{color:var(--accent);cursor:pointer;font-weight:500;}
  td.player-link:hover,.player-link:hover{text-decoration:underline;}
  .team-link{color:var(--accent);cursor:pointer;}
  .team-link:hover{text-decoration:underline;}
  .num{text-align:right;font-variant-numeric:tabular-nums;}
  .pts{color:var(--accent2);font-weight:700;}
  .jersey{color:var(--muted);font-size:.82rem;}
  .goalie-row td:first-child::before{content:'🥅 ';font-size:.8rem;}
  .ph-section-divider td{background:var(--surface2);color:var(--muted);font-size:.72rem;font-weight:700;letter-spacing:.05em;padding:3px 8px;border-top:2px solid var(--border);}
  .ph-goalie-subhdr td{color:var(--muted);font-size:.75rem;font-weight:600;text-align:right;padding:2px 8px;background:var(--surface2);}
  .ph-goalie-subhdr td:first-child,.ph-goalie-subhdr td:nth-child(2),.ph-goalie-subhdr td:nth-child(3){text-align:left;}
  /* Fixed-layout tables so GP and stat columns stay locked at the same x across all seasons */
  .ph-table{table-layout:fixed;width:100%;}
  .ph-table td:first-child,.ph-table th:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .season-badge{display:inline-block;background:var(--accent);color:#fff;border-radius:4px;padding:1px 7px;font-size:.75rem;font-weight:700;}
  .div-badge{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-size:.75rem;color:var(--muted);}
  .search-wrap{position:relative;}
  .autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;max-height:260px;overflow-y:auto;z-index:200;}
  .autocomplete-item{padding:9px 14px;cursor:pointer;font-size:.9rem;border-bottom:1px solid var(--border);transition:background .1s;display:flex;justify-content:space-between;align-items:center;}
  .autocomplete-item:last-child{border-bottom:none;}
  .autocomplete-item:hover,.autocomplete-item.focused{background:var(--surface2);}
  .autocomplete-item .ac-sub{font-size:.75rem;color:var(--muted);}
  .player-history-header{display:flex;align-items:baseline;gap:14px;margin-bottom:20px;flex-wrap:wrap;}
  .player-history-header h2{font-size:1.5rem;font-weight:800;}
  .stat-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:22px;}
  .stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 12px;text-align:center;}
  .stat-card .stat-val{font-size:1.6rem;font-weight:800;color:var(--accent);}
  .stat-card .stat-lbl{font-size:.72rem;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}
  .season-section{margin-bottom:28px;}
  .season-section-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .season-section-header h3{font-size:1rem;font-weight:700;}
  .empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:.95rem;}
  .empty .icon{font-size:2.5rem;margin-bottom:10px;}

  /* ── Club view styles ── */
  .club-totals-bar{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;overflow:hidden;}
  .ctb-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:18px 10px;border-right:1px solid var(--border);}
  .ctb-item:last-child{border-right:none;}
  .ctb-val{font-size:1.8rem;font-weight:800;color:var(--accent);}
  .ctb-lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:4px;}
  .club-team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:24px;}
  .club-team-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:all .15s;}
  .club-team-card:hover,.club-team-card.active{border-color:var(--accent);background:#1a2240;}
  .club-team-card.active{box-shadow:0 0 0 2px var(--accent);}
  .ctc-name{font-size:1rem;font-weight:700;margin-bottom:6px;}
  .ctc-div{margin-bottom:12px;}
  .ctc-stats{display:flex;gap:16px;}
  .ctc-stat{display:flex;flex-direction:column;align-items:center;}
  .ctc-stat strong{font-size:1.3rem;font-weight:800;color:var(--accent);}
  .pts-stat strong{color:var(--accent2);}
  .ctc-stat small{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
  .team-pill{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:.75rem;margin:2px;cursor:pointer;color:var(--accent);transition:background .12s;}
  .team-pill:hover{background:#1a2240;border-color:var(--accent);}
  .birth-yr{display:inline-block;font-size:.68rem;font-weight:600;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0 4px;margin-left:5px;vertical-align:middle;white-space:nowrap;}

  .load-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:500;transition:all .15s;white-space:nowrap;}
  .load-btn:hover{color:var(--text);border-color:var(--accent);}
  .load-status{font-size:.75rem;margin-left:4px;display:none;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  @media(max-width:600px){
    /* Header */
    header{flex-wrap:wrap;padding:10px 14px;gap:10px;}
    header h1{font-size:1rem;}
    .tab-bar{margin-left:0;width:100%;}
    .tab-btn{flex:1;text-align:center;padding:9px 4px;font-size:.78rem;}
    /* Layout */
    main{padding:14px 12px;}
    .panel{padding:14px;}
    /* Controls — stack dropdowns full-width */
    .controls{flex-direction:column;gap:8px;}
    .controls label{width:100%;}
    select,input[type=text]{min-width:unset;width:100%;font-size:1rem;}
    .search-wrap{width:100%;}
    /* Tables — tighter cells, smooth touch scroll */
    .table-wrap{-webkit-overflow-scrolling:touch;}
    thead th{padding:8px 10px;font-size:.68rem;}
    tbody td{padding:8px 10px;font-size:.82rem;}
    /* Player lookup */
    .player-history-header h2{font-size:1.2rem;}
    .stat-summary{grid-template-columns:repeat(3,1fr);}
    .stat-card{padding:10px 6px;}
    .stat-card .stat-val{font-size:1.25rem;}
    .stat-card .stat-lbl{font-size:.65rem;}
    /* Club view */
    .club-totals-bar{flex-wrap:wrap;}
    .ctb-item{min-width:50%;}
    .ctb-val{font-size:1.4rem;}
    .club-team-grid{grid-template-columns:1fr;}
    /* Misc */
    .empty{padding:40px 16px;}
    .section-heading h2{font-size:1.1rem;}
  }
  /* Player popup for flow view */
  #mig-player-popup{
    position:fixed;z-index:9999;
    background:#1e1e30;border:1px solid #4a4a6a;border-radius:8px;
    box-shadow:0 6px 24px rgba(0,0,0,.7);
    min-width:180px;max-width:260px;max-height:320px;
    display:none;overflow:hidden;
    font-family:'Segoe UI',system-ui,sans-serif;
  }
  .mig-popup-title{
    display:flex;align-items:center;gap:4px;
    padding:8px 10px 6px;
    background:#26263e;
    font-size:.8rem;font-weight:700;color:#c8c8e8;
    border-bottom:1px solid #3a3a5a;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .mig-popup-count{font-weight:400;opacity:.65;font-size:.75rem;}
  .mig-popup-close{
    margin-left:auto;background:none;border:none;cursor:pointer;
    color:#888;font-size:1rem;line-height:1;padding:0 2px;
  }
  .mig-popup-close:hover{color:#fff;}
  .mig-popup-body{
    overflow-y:auto;max-height:264px;padding:4px 0;
  }
  .mig-popup-name{
    padding:3px 10px;font-size:.78rem;color:#d0d0f0;
    border-bottom:1px solid #2a2a42;
  }
  .mig-popup-name:last-child{border-bottom:none;}
  .mig-popup-name:hover{background:#2e2e4a;}
</style>
</head>
<body>
<header>
  <h1>⛸ California Hockey <span>Stats DB</span></h1>
  <div style="display:flex;align-items:center;gap:6px;margin-left:auto;margin-right:16px;">
    <span class="load-status" id="load-status">✓ Loaded</span>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="showView('browse',this)">Browse by Season</button>
    <button class="tab-btn" onclick="showView('club',this)">Club View</button>
    <button class="tab-btn" onclick="showView('player',this)">Player Lookup</button>
    <button class="tab-btn" onclick="showView('migration',this);renderMigration()">Player Flow</button>
  </div>
</header>
<main>

<!-- VIEW 1: Browse by Season -->
<div class="view active" id="view-browse">
  <div class="controls">
    <label>Season
      <select id="sel-season" onchange="onSeasonChange()">
        <option value="">— select —</option>
      </select>
    </label>

    <label id="lbl-club-browse">Club
      <select id="sel-club-browse" onchange="onClubBrowseChange()">
        <option value="">— all —</option>
      </select>
    </label>
    <label id="lbl-div-browse">Division
      <select id="sel-div-browse" onchange="onBrowseRender()">
        <option value="">— all —</option>
      </select>
    </label>
    <label>Type
      <select id="sel-type" onchange="onBrowseRender()">
        <option value="skater">Skaters</option>
        <option value="goalie">Goalies</option>
        <option value="all" selected>— all —</option>
      </select>
    </label>
    <label>Min GP
      <select id="sel-min-gp" onchange="onBrowseRender()">
        <option value="1">1+</option>
        <option value="2">2+</option>
        <option value="3">3+</option>
        <option value="4">4+</option>
        <option value="5">5+</option>
        <option value="6">6+</option>
        <option value="7">7+</option>
        <option value="8">8+</option>
        <option value="9">9+</option>
      </select>
    </label>
  </div>
  <div id="browse-content">
    <div class="empty"><div class="icon">🏒</div>Select a season above to begin.</div>
  </div>
</div>

<!-- VIEW 2: Club View -->
<div class="view" id="view-club">
  <div class="controls">
    <label>Club
      <select id="sel-club" onchange="onClubChange()">
        <option value="">— select a club —</option>
      </select>
    </label>
    <label>Season
      <select id="sel-club-season" onchange="onClubSeasonChange()">
        <option value="">— all seasons —</option>
      </select>
    </label>
  </div>
  <div id="club-content">
    <div class="empty"><div class="icon">🏒</div>Select a club above to begin.</div>
  </div>
</div>

<!-- VIEW 3: Player Lookup -->
<div class="view" id="view-player">
  <div class="panel">
    <div class="panel-title">Search for a Player</div>
    <div class="search-wrap">
      <input type="text" id="player-search" placeholder="Type a player name…" autocomplete="off"
             oninput="onPlayerSearch()" onkeydown="onSearchKey(event)">
      <div class="autocomplete-list" id="ac-list" style="display:none"></div>
    </div>
  </div>
  <div id="player-content">
    <div class="empty"><div class="icon">👤</div>Search for a player to see their full history.</div>
  </div>
</div>

<!-- VIEW 4: Player Flow / Migration -->
<div class="view" id="view-migration">
  <div class="panel">
    <div class="panel-title">Player Flow Between Clubs — Season to Season</div>
    <div class="controls">
      <label>Season
        <select id="mig-season" onchange="renderMigration()">
          <option value="27">'21-'22</option>
          <option value="28">'22-'23</option>
          <option value="29">'23-'24</option>
          <option value="30">'24-'25</option>
          <option value="31" selected>'25-'26</option>
        </select>
      </label>
      <select id="mig-min-flow" style="display:none"><option value="1" selected>1+</option></select>
      <label>Club
        <select id="mig-focus-club" onchange="onMigFocusChange()">
          <option value="">All clubs</option>
        </select>
      </label>
      <label>Specific Team
        <select id="mig-team-filter" onchange="renderMigration()">
          <option value="">All teams</option>
        </select>
      </label>
    </div>
  </div>
  <div id="migration-content" style="overflow-x:auto;padding:0 4px;"></div>
  <div style="margin-top:12px;padding:0 4px;" id="migration-legend"></div>
</div>

</main>
<script>
var RAW = {};
</script>
<script>
window.onerror = function(msg,src,line,col,err) {
  document.body.insertAdjacentHTML('afterbegin','<div style="position:fixed;top:0;left:0;right:0;background:red;color:white;padding:10px;z-index:9999;font-size:14px">JS ERROR line '+line+': '+msg+'</div>');
};
const SEASON_LABELS = {27:"'21-'22",28:"'22-'23",29:"'23-'24",30:"'24-'25",31:"'25-'26"};
const SEASONS = [27,28,29,30,31];
var ALL_ENTRIES = [];
var CAHA_RAW = {};
var COMBINED_RAW = {};
for (const [name, entries] of Object.entries(RAW)) {
  for (const e of entries) ALL_ENTRIES.push({playerName:name, source:'norcal', ...e});
}

// ── Parse NorCal team names: extract division and build team display name ──
// e.g. "Tri Valley Blue Devils 12AA-2" → division="12AA", teamBase="Tri Valley Blue Devils 12-2"
//      "Capital Thunder 14BB"          → division="14BB", teamBase="Capital Thunder"
// e.team is left unchanged so Club View grouping (which uses e.team) still works.
(function(){
  var re = /\s(\d{2}[A-Z]*)(-\d+)?$/;
  ALL_ENTRIES.forEach(function(e){
    if(!e.division && e.team){
      var m = e.team.match(re);
      if(m){
        e.division = m[1] || null;
        var club = e.team.slice(0, -m[0].length);
        // Only set teamBase for sub-teams (e.g. "10B-1" → "Club 10B-1").
        // Preserve the tier letter so e.g. 10A-2 and 10B-2 stay separate in Club View.
        // For single teams, leave teamBase unset so Club View falls back to e.team.
        if (m[2]) e.teamBase = club + ' ' + m[1] + m[2];
      }
    }
    // Set canonical club name for all NorCal entries
  });
})();

// ── View switching ──
function showView(v, btn) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if(btn) btn.classList.add('active');
}

// ════════════════════════════════════════
// VIEW 1: Browse
// ════════════════════════════════════════
let browseSort={col:'PTS',dir:-1};
function initBrowse(){
  const sel=document.getElementById('sel-season');
  SEASONS.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=SEASON_LABELS[s];sel.appendChild(o);});
  sel.value=SEASONS[SEASONS.length-1];
  onSeasonChange();
}
function onSeasonChange(){
  const season=parseInt(document.getElementById('sel-season').value);
  const clubSel=document.getElementById('sel-club-browse');
  const divSel=document.getElementById('sel-div-browse');
  // Reset both dropdowns
  clubSel.innerHTML='<option value="">— all —</option>';
  divSel.innerHTML='<option value="">— all —</option>';
  if(!season){onBrowseRender();return;}
  // Populate Club dropdown: all clubs with data for this season
  const entries=ALL_ENTRIES.filter(e=>e.season===season);
  const clubs=[...new Set(entries.map(e=>e.club).filter(Boolean))].sort((a,b)=>clubDisplayName(a).localeCompare(clubDisplayName(b)));
  clubs.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=clubDisplayName(c);clubSel.appendChild(o);});
  // Populate Division dropdown: all divisions for this season
  const divs=[...new Set(entries.map(e=>e.division).filter(Boolean))].sort();
  divs.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;divSel.appendChild(o);});
  onBrowseRender();
}
function onClubBrowseChange(){
  const season=parseInt(document.getElementById('sel-season').value);
  const club=document.getElementById('sel-club-browse').value;
  const divSel=document.getElementById('sel-div-browse');
  const prevDiv=divSel.value;
  divSel.innerHTML='<option value="">— all —</option>';
  if(season){
    let entries=ALL_ENTRIES.filter(e=>e.season===season);
    if(club)entries=entries.filter(e=>e.club===club);
    const divs=[...new Set(entries.map(e=>e.division).filter(Boolean))].sort();
    divs.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;divSel.appendChild(o);});
    // Restore previous selection if still valid
    if(prevDiv && divs.includes(prevDiv))divSel.value=prevDiv;
  }
  onBrowseRender();
}
function onBrowseRender(){
  const season=parseInt(document.getElementById('sel-season').value);
  const club=document.getElementById('sel-club-browse').value;
  const div=document.getElementById('sel-div-browse').value;
  const type=document.getElementById('sel-type').value;
  const minGP=parseInt(document.getElementById('sel-min-gp').value)||1;
  if(!season){document.getElementById('browse-content').innerHTML='<div class="empty"><div class="icon">🏒</div>Select a season above to begin.</div>';return;}
  // Build label
  let subLabel='';
  if(club)subLabel+=' · '+clubDisplayName(club);
  if(div)subLabel+=' · '+div;
  const content=document.getElementById('browse-content');
  let html='';
  // Helper to filter entries
  const baseFilter=e=>e.season===season&&(club?e.club===club:true)&&(div?e.division===div:true);
  if(type==='skater'||type==='all'){
    let sk=ALL_ENTRIES.filter(e=>baseFilter(e)&&e.type==='skater'&&(parseInt(e.GP)||0)>=minGP);
    browseSort={col:'PTS',dir:-1};
    sk.sort((a,b)=>entryPts(b)-entryPts(a));
    if(sk.length){
      html+='<div class="section-heading"><h2>'+escHtml(SEASON_LABELS[season]+(subLabel||' · All'))+'</h2><span class="badge">'+sk.length+' skaters</span></div>'+renderSkaterTable(sk,true,'browse-table');
    } else {
      html+='<div class="empty" style="padding:12px 0"><div class="icon">📭</div>No skater data found.</div>';
    }
  }
  if(type==='goalie'||type==='all'){
    let gl=ALL_ENTRIES.filter(e=>baseFilter(e)&&e.type==='goalie'&&(parseInt(e.GP)||0)>=minGP);
    browseGoalieSort={col:'GAA',dir:1};
    gl.sort((a,b)=>(parseFloat(a.GAA)||0)-(parseFloat(b.GAA)||0));
    if(gl.length){
      if(type==='all')html+='<div style="margin-top:24px"></div>';

// ═══════════════════════════════════════
// CLUB EXTRACTION
// ═══════════════════════════════════════
// Maps internal club keys to user-facing display names.
function clubDisplayName(c) {
  return (c || '')
    .replace('San Jose Jr Sharks Girls', 'Jr. Sharks Girls')
    .replace('San Jose Jr Sharks', 'Jr. Sharks')
    .replace('Tri Valley Lady Blue Devils', 'Tri-Valley Lady Blue Devils')
    .replace('Tri Valley Blue Devils', 'Tri-Valley Blue Devils')
    .replace('Tri Valley Bulls', 'Tri-Valley Bulls');
}
const CLUB_CANONICAL = {
  'Tri-Valley Blue Devils': 'Tri Valley Blue Devils',
  'San Mateo Blackstars':   'San Mateo Black Stars',
};

const CLUB_PREFIXES = [
  'San Jose Jr Sharks Girls',
  'San Jose Jr Sharks',
  'Tri Valley Lady Blue Devils',
  'Tri Valley Blue Devils',
  'Tri-Valley Lady Blue Devils',
  'Tri-Valley Blue Devils',
  'Tri-Valley Bulls',
  'Santa Clara Blackhawks',
  'Santa Rosa Flyers',
  'San Francisco Sabercats',
  'San Mateo Black Stars',
  'Cupertino Cougars',
  'Oakland Bears',
  'Vacaville Jets',
  'Capital Thunder',
  'Stockton Colts Girls',
  'Stockton Colts',
  'Lake Tahoe Grizzlies',
  'Reno Ice',
  'Fresno Jr Monsters',
  'Golden State Elite',
].sort((a,b) => b.length - a.length);

function normalizeTeam(t) { return (t||'').replace(/\s+/g,' ').trim(); }
// Returns just the division+team suffix for display within a club context.
// e.g. "Cupertino Cougars 10B-1" → "10B-1",  "San Jose Jr Sharks 12AA" → "12AA"
// Also handles no-letter cases: "San Jose Jr Sharks 12-5" → "12-5"
function teamSuffix(t) {
  var m = (t||'').match(/\s(\d{2}[A-Z]*(?:-\d+)?)$/);
  return m ? m[1] : (t||'');
}

function extractClub(teamName) {
  let norm = normalizeTeam(teamName);
  // Fix canonical variants first
  for (const [variant, canonical] of Object.entries(CLUB_CANONICAL)) {
    if (norm.toLowerCase().startsWith(variant.toLowerCase())) {
      norm = canonical + norm.slice(variant.length);
      break;
    }
  }
  for (const prefix of CLUB_PREFIXES) {
    if (norm.toLowerCase().startsWith(prefix.toLowerCase())) return prefix;
  }
  // Fallback: drop last token
  const parts = norm.split(' ');
  return parts.length > 1 ? parts.slice(0,-1).join(' ') : norm;
}

// ── CAHA club normalisation ───────────────────────────────────────────────
const CAHA_CLUB_MAP = {
  'Jr. Sharks':        'San Jose Jr Sharks',
  'Jr. Sharks Girls':  'San Jose Jr Sharks Girls',
  'Blackhawks':        'Santa Clara Blackhawks',
  'Oakland Bears':     'Oakland Bears',
  'Lady Blue Devils':  'Tri Valley Lady Blue Devils',
  'GSE':               'Golden State Elite',
};

// '16U Boys AA' → '16AA'   /   '14U Girls AAA' → 'Girls 14AAA'
function normalizeCahaDivision(div) {
  var m = (div || '').match(/^(\d+)U(?:\/\d+U)?\s+(Boys|Girls)\s+(?:(\d+)O\s+)?(.+)$/);
  if (!m) return div;
  var ageU=parseInt(m[1]),gender=m[2],overage=m[3]?parseInt(m[3]):null,tier=m[4].trim();
  var age=ageU;
  if(tier==='AAA Major'){tier='AAA';}
  else if(tier==='AAA Minor'){tier='AAA';age=ageU-1;}
  else if(overage){age=overage;}
  return gender==='Boys'?age+tier:'Girls '+age+tier;
}

// Compute PTS (G+A) uniformly from any entry
function entryPts(e) { return (parseInt(e.G)||0) + (parseInt(e.A)||0); }

// Display suspension value — show '-' when no data
function dispSusp(e){ return (e.SUSP!=null && e.SUSP!=='') ? e.SUSP : '-'; }

// Compute Pts/GP uniformly
function entryPtsPerGame(e) {
  var gp = parseInt(e.GP)||0;
  var pts = entryPts(e);
  return gp > 0 ? (pts/gp).toFixed(2) : '0.00';
}

// Save% field (NorCal = 'Save%', CAHA = 'SVA')
function entrySavePct(e) { return e['Save%'] || e.SVA || ''; }
function entrySavePctVal(e) { return parseFloat(e['Save%'] || e.SVA) || 0; }

// GA field (NorCal = 'GA', CAHA derived from SHOTS - SAVES)
function entryGA(e) {
  if (e.GA !== undefined) return parseInt(e.GA)||0;
  return Math.max(0, (parseInt(e.SHOTS)||0) - (parseInt(e.SAVES)||0));
}

// Set e.club on all NorCal ALL_ENTRIES (now that extractClub/CLUB_CANONICAL are available)
ALL_ENTRIES.forEach(function(e) { if (!e.club) e.club = extractClub(e.team); });

// Pre-build club → team mapping for quick lookup
var CLUB_TEAM_MAP = {}; // club → Set of canonical team names (normalized)
ALL_ENTRIES.forEach(function(e) {
  var club = e.club;
  var normTeam = normalizeTeam(e.team);
  if (!CLUB_TEAM_MAP[club]) CLUB_TEAM_MAP[club] = new Set();
  CLUB_TEAM_MAP[club].add(normTeam);
});
var ALL_CLUBS = Object.keys(CLUB_TEAM_MAP).sort((a,b)=>clubDisplayName(a).localeCompare(clubDisplayName(b)));

  });

  SEASONS.forEach(s => {

    o.value = s; o.textContent = SEASON_LABELS[s];

  });

function onClubChange() { renderClub(); }
function onClubSeasonChange() { renderClub(); }

function renderClub() {
  const club = document.getElementById('sel-club').value;
  const season = parseInt(document.getElementById('sel-club-season').value);
  const content = document.getElementById('club-content');

  if (!club) {
    content.innerHTML = '<div class="empty"><div class="icon">🏒</div>Select a club above to begin.</div>';
    return;
  }

  // Get all entries for this club across all seasons (or filtered by season)
  const allClubEntries = ALL_ENTRIES.filter(e => e.club === club);

  if (!season) {
    // Show season-by-season overview for this club
    renderClubOverview(club, allClubEntries, content);
  } else {
    // Show this club in a specific season
    const seasonEntries = allClubEntries.filter(e => e.season === season);
    if (!seasonEntries.length) {
      content.innerHTML = `<div class="empty"><div class="icon">📭</div>${escHtml(club)} had no recorded teams in ${SEASON_LABELS[season]}.</div>`;
      return;
    }
    renderClubSeason(club, season, seasonEntries, content);
  }
}

function renderClubOverview(club, entries, content) {

// ── Utils ──
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}



// ── Name normalization (collapse double-spaces, merge duplicate keys) ──
function normalizeName(name) {
  return name.replace(/\s+/g, ' ').trim()        // collapse whitespace
             .replace(/\s[A-Z]\.?\s/g, ' ')      // strip middle initial (with or without period): "John A. Smith" / "John A Smith" → "John Smith"
             .replace(/\s[A-Z]\.?$/, '');         // strip trailing middle initial: "John A." / "John A" → "John"
}
function normalizeRaw(rawObj) {
  var result = {};
  Object.keys(rawObj).forEach(function(name) {
    var norm = normalizeName(name);
    if (!result[norm]) result[norm] = [];
    result[norm] = result[norm].concat(rawObj[name]);
  });
  return result;
}

// ── Birth year inference ──
var BIRTH_YEARS = {};

// Returns the division string for an entry. If e.division is blank (common for
// goalie entries), falls back to parsing the age/tier suffix from the team name.
// e.g. "San Jose Jr Sharks 10B-1" → "10B", "Cupertino Cougars 12A" → "12A"
function divisionForEntry(e) {
  if (e.division) return e.division;
  var m = (e.team||'').match(/(\d+[A-Za-z]+)(?:-\d+)?$/);
  return m ? m[1].toUpperCase() : '';
}

function inferBirthYear(entries) {
  var possible = null;

  entries.forEach(function(e) {
    var div = divisionForEntry(e);
    if (!div) return;
    var startYear = 1994 + e.season; // S27→2021, S31→2025
    var set = null;

    // NorCal format: "16U", "18U AA", etc. — 2-year range
    var mU = div.match(/^(\d+)U/);
    if (mU) {
      var ageLimit = parseInt(mU[1]);
      set = {};
      for (var y = startYear - ageLimit; y <= startYear - (ageLimit - 1); y++) set[y] = true;
    }

    // CAHA normalized format: "16AAA", "Girls 14AAA", "13AA", "18A", etc.
    // Boys AAA ages 12-16: single birth year (AAA = top tier, age-locked).
    // Everything else (AA, A, girls, 17-18): 2-year range like NorCal XU.
    if (!set) {
      var mC = div.match(/^(Girls )?(\d+)(A+)$/);
      if (mC) {
        var isGirls = !!mC[1];
        var age = parseInt(mC[2]);
        var tier = mC[3];
        if (!isGirls && tier === 'AAA' && age >= 12 && age <= 16) {
          set = {};
          set[startYear - age] = true; // boys AAA only: exact single birth year
        } else if (age >= 10 && age <= 18) {
          set = {};
          set[startYear - age] = true;
          set[startYear - age + 1] = true; // AA/A/girls: 2-year range
        }
      }
    }

    // Catch-all for NorCal extracted divisions: "10B", "12BB", "14B-1", "Girls 14B", etc.
    // These don't match the U-format or A-tier patterns above, but the leading number
    // still tells us the age group → 2-year range.
    if (!set) {
      var mN = div.match(/^(?:Girls )?(\d+)[A-Z]/);
      if (mN) {
        var age = parseInt(mN[1]);
        if (age >= 10 && age <= 18) {
          set = {};
          set[startYear - age] = true;
          set[startYear - age + 1] = true;
        }
      }
    }

    if (!set) return;
    if (!possible) {
      possible = set;
    } else {
      var next = {};
      Object.keys(possible).forEach(function(y) { if (set[y]) next[y] = true; });
      if (Object.keys(next).length > 0) possible = next; // only narrow, never wipe
    }
  });

  if (!possible) return null;
  var keys = Object.keys(possible);
  if (keys.length === 1) return parseInt(keys[0]);

  // ── Disambiguate 18U / 18AAA: use 16U history ──────────────────────────
  // If still 2 possible years, find when they first hit 18U and check
  // whether they were on a 16 division the season before (→ younger year)
  // or two seasons before (→ older year, gap year in between).
  if (keys.length === 2) {
    var sortedYears = keys.map(Number).sort(function(a,b){ return b - a; });
    var newerYear = sortedYears[0];
    var olderYear  = sortedYears[1];

    // Use the MOST RECENT 18U season as the reference point.
    // (Using the earliest would misfire for '07 players with multiple 18U seasons:
    // their S(first18-1) was 16U, which would incorrectly signal the younger year.)
    var latestSeason18 = -Infinity;
    entries.forEach(function(e) {
      if (e.type !== 'skater' || !e.division) return;
      if (/^18/.test(e.division)) {
        if (e.season > latestSeason18) latestSeason18 = e.season;
      }
    });

    if (latestSeason18 > -Infinity) {
      var prevS  = latestSeason18 - 1;
      var prev2S = latestSeason18 - 2;
      // "on a 16U team of any kind" = division starts with 16
      var on16UPrev = entries.some(function(e) {
        return e.type === 'skater' && e.season === prevS &&
               e.division && /^(?:Girls )?16/.test(e.division);
      });
      var on16UPrevPrev = entries.some(function(e) {
        return e.type === 'skater' && e.season === prev2S &&
               e.division && /^(?:Girls )?16/.test(e.division);
      });
      // Only trust the two-seasons-back signal if we actually have data in the gap
      // season — a missing season looks identical to a deliberate skip, so don't guess.
      var hasDataInGap = entries.some(function(e) { return e.season === prevS; });
      if (on16UPrev)                    return newerYear; // 16U right before 18U → younger
      if (on16UPrevPrev && hasDataInGap) return olderYear; // confirmed gap year → older
    }
  }

  return null;
}

// ── Same-name collision detection & splitting ────────────────────────────

// Returns array of possible birth years for a single entry (same logic as inferBirthYear)
function entryBirthYearSet(e) {
  var div = divisionForEntry(e);
  if (!div) return null;
  var startYear = 1994 + e.season;
  var mU = div.match(/^(\d+)U/);
  if (mU) {
    var age = parseInt(mU[1]);
    return [startYear - age, startYear - age + 1];
  }
  var mC = div.match(/^(Girls )?(\d+)(A+)$/);
  if (mC) {
    var isGirls = !!mC[1], age = parseInt(mC[2]), tier = mC[3];
    if (!isGirls && tier === 'AAA' && age >= 12 && age <= 16) return [startYear - age]; // boys AAA: single year
    if (age >= 12 && age <= 18) return [startYear - age, startYear - age + 1]; // everything else: 2-year range
  }
  // Catch-all: "10B", "12BB", "14A-1", etc. — extract leading age number
  var mN = div.match(/^(?:Girls )?(\d+)[A-Z]/);
  if (mN) {
    var age = parseInt(mN[1]);
    if (age >= 10 && age <= 18) return [startYear - age, startYear - age + 1];
  }
  return null;
}

function intersectBySets(a, b) {
  if (!a || !b) return a || b || null;
  var r = a.filter(function(y) { return b.indexOf(y) >= 0; });
  return r.length ? r : null; // null = incompatible
}

// Returns array of clusters (each cluster = array of entries for one distinct person)
function splitCollisionEntries(entries) {
  // Sort chronologically so we build clusters in a stable order
  var sorted = entries.slice().sort(function(a, b) { return a.season - b.season; });

  // A real collision only exists when two same-season/same-source entries have
  // INCOMPATIBLE birth-year ranges — not merely different divisions.
  // A player legitimately on two teams in the same season has compatible (or
  // indeterminate) birth-year ranges and must NOT be split.
  function realConflict(a, b) {
    if (a.season !== b.season || a.source !== b.source) return false;
    if (!a.division || !b.division || a.division === b.division) return false;
    var aBy = entryBirthYearSet(a), bBy = entryBirthYearSet(b);
    // Only a conflict if both ranges are known AND they don't overlap
    return aBy && bBy && intersectBySets(aBy, bBy) === null;
  }

  // Quick check: is there any genuine birth-year-incompatible conflict?
  var hasConflict = false;
  outer: for (var i = 0; i < sorted.length; i++) {
    for (var j = i + 1; j < sorted.length; j++) {
      if (realConflict(sorted[i], sorted[j])) { hasConflict = true; break outer; }
    }
  }
  if (!hasConflict) return [entries];

  // Greedy clustering: assign each entry to the first compatible cluster
  var clusters = []; // each: { entries:[], bySet:[] }
  sorted.forEach(function(e) {
    var eBySet = entryBirthYearSet(e);
    for (var ci = 0; ci < clusters.length; ci++) {
      var c = clusters[ci];
      // Only exclude a cluster if this entry has a birth-year conflict with it
      var conflict = c.entries.some(function(ce) { return realConflict(ce, e); });
      if (conflict) continue;
      // Birth year must be compatible
      var newBy = intersectBySets(c.bySet, eBySet);
      if (c.bySet && eBySet && newBy === null) continue;
      c.entries.push(e);
      if (newBy) c.bySet = newBy;
      else if (eBySet && !c.bySet) c.bySet = eBySet;
      return; // placed
    }
    // No compatible cluster found — start a new one
    clusters.push({ entries: [e], bySet: eBySet });
  });

  return clusters.map(function(c) { return c.entries; });
}

// Scans COMBINED_RAW for same-name collisions, splits them, and updates
// ALL_PLAYER_NAMES + ALL_ENTRIES.playerName accordingly.
// Idempotent: un-splits previous results before re-splitting, so safe to call
// after each data load (NorCal reload, CAHA merge, etc.).
function resolveCollisions() {
  var cr = window.COMBINED_RAW;
  if (!cr) return;

  // Step 1: Merge any previously split entries back to their original base name
  var merged = {};
  Object.keys(cr).forEach(function(name) {
    cr[name].forEach(function(e) {
      var base = e._origName || name;
      if (!merged[base]) merged[base] = [];
      var clean = Object.assign({}, e);
      delete clean._split; delete clean._origName;
      clean.playerName = base;
      merged[base].push(clean);
    });
  });

  // Step 2: For each base name, detect and split collisions
  var newCR = {};
  var renames = []; // [{origName, newName, entries}]

  Object.keys(merged).forEach(function(name) {
    var clusters = splitCollisionEntries(merged[name]);
    if (clusters.length === 1) {
      newCR[name] = clusters[0];
      return;
    }
    var usedLabels = {};
    clusters.forEach(function(cluster) {
      var by = inferBirthYear(cluster);
      var label;
      if (by) {
        label = name + " '" + String(by).slice(2);
      } else {
        // Fallback: use latest division seen in cluster
        var lastDiv = '';
        cluster.forEach(function(e) { if (e.division) lastDiv = e.division; });
        label = lastDiv ? name + ' (' + lastDiv + ')' : name;
      }
      // Ensure unique label
      if (!usedLabels[label]) usedLabels[label] = 0;
      usedLabels[label]++;
      var finalLabel = label;
      if (usedLabels[label] > 1) finalLabel = label + ' #' + usedLabels[label];

      newCR[finalLabel] = cluster.map(function(e) {
        return Object.assign({}, e, { playerName: finalLabel, _split: true, _origName: name });
      });
      renames.push({ origName: name, newName: finalLabel, entries: cluster });
    });
  });

  window.COMBINED_RAW = newCR;
  window.ALL_PLAYER_NAMES = Object.keys(newCR).sort();

  // Step 3: Sync playerName in ALL_ENTRIES
  if (window.ALL_ENTRIES && renames.length) {
    // Reset any previous splits
    window.ALL_ENTRIES.forEach(function(ae) {
      if (ae._origName) { ae.playerName = ae._origName; delete ae._origName; delete ae._split; }
    });
    // Apply new splits — match by season + source + team + type + GP + G
    renames.forEach(function(r) {
      r.entries.forEach(function(ce) {
        for (var i = 0; i < window.ALL_ENTRIES.length; i++) {
          var ae = window.ALL_ENTRIES[i];
          if (ae.playerName === r.origName &&
              ae.season === ce.season && ae.team === ce.team &&
              ae.source === ce.source && ae.type === ce.type &&
              (parseInt(ae.GP)||0) === (parseInt(ce.GP)||0) &&
              (parseInt(ae.G)||0)  === (parseInt(ce.G)||0)) {
            ae.playerName = r.newName;
            ae._origName  = r.origName;
            ae._split     = true;
            break;
          }
        }
      });
    });
  }
}

// Strip all periods from every player name in COMBINED_RAW and ALL_ENTRIES.
// "Avery St. Onge" → "Avery St Onge", "Jeffrey Crawford Jr." → "Jeffrey Crawford Jr"
// If stripping a period causes two keys to become identical, their entries are merged.
function stripPeriodsFromNames() {
  var cr = window.COMBINED_RAW;
  if (!cr) return;
  Object.keys(cr).forEach(function(name) {
    if (name.indexOf('.') === -1) return;
    var cleaned = name.replace(/\./g, '').replace(/\s+/g, ' ').trim();
    if (cleaned === name) return;
    if (!cr[cleaned]) cr[cleaned] = [];
    (cr[name] || []).forEach(function(e) { cr[cleaned].push(e); });
    delete cr[name];
  });
  (window.ALL_ENTRIES || []).forEach(function(e) {
    if (e.playerName && e.playerName.indexOf('.') !== -1)
      e.playerName = e.playerName.replace(/\./g, '').replace(/\s+/g, ' ').trim();
  });
  window.ALL_PLAYER_NAMES = Object.keys(cr).sort();
}

// Merge names whose only difference is a trailing numeric suffix — either Arabic digits
// ("Carlos Ayon 3") or Roman numeral characters I/V/X ("Carlos Ayon II" → "Carlos Ayon III").
// Both forms strip to the same base name and are merged when seasons don't overlap.
function mergeNumericSuffixVariants() {
  var cr = window.COMBINED_RAW;
  if (!cr) return;

  // Strip a trailing word composed entirely of digits or Roman numeral chars (I, V, X).
  function baseName(name) {
    return name.replace(/\s+[ivx\d]+$/i, '').trim();
  }

  // Group names that share a base name after suffix stripping.
  // Only names that actually have a suffix stripped participate.
  var byBase = {};
  Object.keys(cr).forEach(function(name) {
    var base = baseName(name);
    if (base === name) return;
    if (!byBase[base]) byBase[base] = [];
    byBase[base].push(name);
  });
  // Pull in bare base-name entries if they exist (e.g. "Carlos Ayon" itself)
  Object.keys(byBase).forEach(function(base) {
    if (cr[base] && byBase[base].indexOf(base) === -1) byBase[base].unshift(base);
  });

  var renames = {};
  Object.keys(byBase).forEach(function(base) {
    var variants = byBase[base].filter(function(v, i, a) { return a.indexOf(v) === i; });
    if (variants.length < 2) return;
    // Season overlap check (de-dupe within each variant first)
    var allSeasons = {}, overlap = false;
    variants.forEach(function(v) {
      var s = {};
      (cr[v] || []).forEach(function(e) { s[e.season] = true; });
      Object.keys(s).forEach(function(k) { if (allSeasons[k]) overlap = true; allSeasons[k] = true; });
    });
    if (overlap) return;
    // Canonical: bare base name if present, else most entries, else alphabetical
    variants.sort(function(a, b) {
      if (a === base) return -1;
      if (b === base) return 1;
      return (cr[b]||[]).length - (cr[a]||[]).length || a.localeCompare(b);
    });
    var canonical = variants[0];
    variants.slice(1).forEach(function(v) { renames[v] = canonical; });
  });

  if (!Object.keys(renames).length) return;
  Object.keys(renames).forEach(function(oldName) {
    var newName = renames[oldName];
    if (!cr[newName]) cr[newName] = [];
    (cr[oldName] || []).forEach(function(e) { cr[newName].push(e); });
    delete cr[oldName];
  });
  (window.ALL_ENTRIES || []).forEach(function(e) {
    if (renames[e.playerName]) e.playerName = renames[e.playerName];
  });
  window.ALL_PLAYER_NAMES = Object.keys(cr).sort();
  console.log('mergeNumericSuffixVariants:', Object.keys(renames).length, 'merged:', renames);
}

// Merge names that are identical except for casing (e.g. "Carlos Ayon II" vs "Carlos Ayon Ii").
// Canonical = the variant with the most entries; ties broken alphabetically.
function mergeCaseVariants() {
  var cr = window.COMBINED_RAW;
  if (!cr) return;
  var byLower = {};
  Object.keys(cr).forEach(function(name) {
    var key = name.toLowerCase();
    if (!byLower[key]) byLower[key] = [];
    byLower[key].push(name);
  });
  var renames = {};
  Object.keys(byLower).forEach(function(key) {
    var variants = byLower[key];
    if (variants.length < 2) return;
    // Check no season overlap across variants
    var allSeasons = {}, overlap = false;
    variants.forEach(function(v) {
      var s = {};
      (cr[v] || []).forEach(function(e) { s[e.season] = true; });
      Object.keys(s).forEach(function(k) { if (allSeasons[k]) overlap = true; allSeasons[k] = true; });
    });
    if (overlap) return;
    // Canonical = most entries; ties → alphabetical
    variants.sort(function(a, b) {
      return (cr[b]||[]).length - (cr[a]||[]).length || a.localeCompare(b);
    });
    var canonical = variants[0];
    variants.slice(1).forEach(function(v) { renames[v] = canonical; });
  });
  if (!Object.keys(renames).length) return;
  Object.keys(renames).forEach(function(oldName) {
    var newName = renames[oldName];
    if (!cr[newName]) cr[newName] = [];
    (cr[oldName] || []).forEach(function(e) { cr[newName].push(e); });

  });
  (window.ALL_ENTRIES || []).forEach(function(e) {

// Merge "First Middle Last" → "First Last" name variants when the names share
// the same first and last word and have no overlapping seasons.
function mergeMiddleNameVariants() {
  var cr = window.COMBINED_RAW;
  if (!cr) return;

  // Returns true if any season+type combination appears under more than one variant.
  // Using season+type as the key means a goalie record in S29 and a skater record
  // in S29 (two-way player split across names) do NOT count as a conflict.
  function hasOverlap(variants) {
    var allKeys = {}, overlap = false;
    variants.forEach(function(v) {
      var keysThisVariant = {};
      (cr[v] || []).forEach(function(e) { keysThisVariant[e.season + '|' + (e.type||'')] = true; });
      Object.keys(keysThisVariant).forEach(function(k) {
        if (allKeys[k]) overlap = true;
        allKeys[k] = true;
      });
    });
    return overlap;
  }

  // Index by "first|last" (lowercase) → name variants
  var byFirstLast = {};
  Object.keys(cr).forEach(function(name) {
    var parts = name.trim().toLowerCase().split(/\s+/);
    if (parts.length < 2) return;
    var key = parts[0] + '|' + parts[parts.length - 1];
    if (!byFirstLast[key]) byFirstLast[key] = [];
    byFirstLast[key].push(name);
  });

  var renames = {};
  Object.keys(byFirstLast).forEach(function(key) {
    var variants = byFirstLast[key];
    if (variants.length < 2) return;
    variants.sort(function(a, b) { return a.split(/\s+/).length - b.split(/\s+/).length; });
    var canonical = variants[0];
    if (canonical.split(/\s+/).length !== 2) return; // only merge when canonical is "First Last"
    if (hasOverlap(variants)) return;
    variants.slice(1).forEach(function(v) { renames[v] = canonical; });
  });

  if (!Object.keys(renames).length) return;

  Object.keys(renames).forEach(function(oldName) {
    var newName = renames[oldName];
    if (!cr[newName]) cr[newName] = [];
    (cr[oldName] || []).forEach(function(e) { cr[newName].push(e); });
    delete cr[oldName];
  });
  (window.ALL_ENTRIES || []).forEach(function(e) {
    if (renames[e.playerName]) e.playerName = renames[e.playerName];
  });
  window.ALL_PLAYER_NAMES = Object.keys(cr).sort();
  console.log('mergeMiddleNameVariants: merged', Object.keys(renames).length, 'variant(s):', renames);
}

function refreshBirthYears() {

function migShowPlayerPopup(names, clubLabel, seasonLabel, ev) {
  var popup = document.getElementById('mig-player-popup');

    document.body.appendChild(popup);
  }

  var html = '<div class="mig-popup-title">'

  if (closeEl) closeEl.onclick = function() { popup.style.display = 'none'; };
  popup.style.display = 'block';

  // Position near click, keeping within viewport
  var x = ev.clientX + 14, y = ev.clientY - 10;
  popup.style.left = '0'; popup.style.top = '0';
  var pw = popup.offsetWidth || 220, ph = popup.offsetHeight || 200;
  if (x + pw + 8 > window.innerWidth)  x = ev.clientX - pw - 14;
  if (y + ph + 8 > window.innerHeight) y = window.innerHeight - ph - 8;
  popup.style.left = Math.max(8, x) + 'px';
  popup.style.top  = Math.max(8, y) + 'px';

  // Dismiss on next click outside
  setTimeout(function() {
    function closePopup(e) {
      if (!popup.contains(e.target)) {
        popup.style.display = 'none';
        document.removeEventListener('click', closePopup, true);
      }
    }
    document.addEventListener('click', closePopup, true);
  }, 0);
}
