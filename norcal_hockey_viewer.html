  if (focusClub && allClubs.indexOf(focusClub) >= 0) {
    focusActive = true;
    // Build per-season allowed-club sets based on flows through the primary season
    var connectedBySeasonForFocus = {};
    SEASONS.forEach(function(s) { connectedBySeasonForFocus[s] = {}; });
    // Focus club always appears in primary season column
    connectedBySeasonForFocus[primarySeason][focusClub] = true;
    // Include NO_DATA in primary season if it exists there
    if (seasonClubCounts[primarySeason] && seasonClubCounts[primarySeason][NO_DATA]) {
      connectedBySeasonForFocus[primarySeason][NO_DATA] = true;
    }
    Object.keys(flowMap).forEach(function(k) {
      var f = flowMap[k];
      // Flows arriving AT focusClub in primary season → show source club in the previous season column
      if (f.toSeason === primarySeason && f.toClub === focusClub) {
        if (connectedBySeasonForFocus[f.fromSeason] !== undefined) {
          connectedBySeasonForFocus[f.fromSeason][f.fromClub] = true;
        }
      }
      // Flows LEAVING focusClub from primary season → show destination club in the next season column
      if (f.fromSeason === primarySeason && f.fromClub === focusClub) {
        if (connectedBySeasonForFocus[f.toSeason] !== undefined) {
          connectedBySeasonForFocus[f.toSeason][f.toClub] = true;
        }
      }
    });
    // Remove unconnected clubs from every season bucket
    Object.keys(seasonClubCounts).forEach(function(s) {
      var si = parseInt(s);
      Object.keys(seasonClubCounts[s]).forEach(function(c) {
        if (!connectedBySeasonForFocus[si] || !connectedBySeasonForFocus[si][c]) {
          delete seasonClubCounts[s][c];
        }
      });
    });
  }

  function abbr(name) {
    return clubDisplayName(name)
      .replace('Jr. Sharks Girls','Jr. Sharks Girls')   // already display-ready
      .replace('Jr. Sharks','Jr. Sharks')               // already display-ready
      .replace('Tri-Valley Lady Blue Devils','TV Lady Blue Devils')
      .replace('Tri-Valley Blue Devils','TV Blue Devils')
      .replace('Tri-Valley Bulls','TV Bulls')
      .replace('Santa Clara Blackhawks','SC Blackhawks')
      .replace('San Francisco Sabercats','SF Sabercats')
      .replace('San Mateo Black Stars','SM Black Stars')
      .replace('Stockton Colts Girls','Stockton Girls')
      .replace('Cupertino ','')
      .replace('Golden State Elite','GS Elite')
      .replace('Fresno Jr Monsters','Fresno Jr');
  }

  // ── 4. Layout ─────────────────────────────────────────────────────
  var W         = Math.max((container.clientWidth || 700) - 8, 500);
  var BAR_W     = Math.max(140, Math.min(200, Math.floor(W / 5)));
  var H         = 560;
  var PT = 42, PB = 16, PL = 4, PR = 4;
  var chartH    = H - PT - PB;
  var BAR_GAP   = 5;
  var NO_DATA_H = 24;  // fixed height for No Data block
  var colSpacing = (W - PL - PR - BAR_W) / (SEASONS.length - 1);

  var seasonX = {};
  SEASONS.forEach(function(s, i){ seasonX[s] = PL + i * colSpacing; });

  // Compute block positions per (season, club)
  var blockPos = {}; // {season: {club: {y0,h,count}}}
  SEASONS.forEach(function(season) {
    var cc = seasonClubCounts[season];
    if (!cc) return;
    var clubs = Object.keys(cc).sort(function(a,b){
      if (a === NO_DATA) return 1;   // always last
      if (b === NO_DATA) return -1;
      return cc[b] - cc[a];
    });
    var hasNoData = cc[NO_DATA] !== undefined;
    // Reserve space for No Data block at the bottom; distribute the rest by count
    var realClubs = clubs.filter(function(c){ return c !== NO_DATA; });
    var total  = realClubs.reduce(function(s,c){ return s+cc[c]; }, 0);
    var gaps   = (clubs.length - 1) * BAR_GAP;
    var noDataReserve = hasNoData ? (NO_DATA_H + BAR_GAP) : 0;
    var avail  = chartH - gaps - noDataReserve;
    var y = PT;
    blockPos[season] = {};
    realClubs.forEach(function(club) {
      var h = Math.max(4, (cc[club] / total) * avail);
      blockPos[season][club] = {y0: y, h: h, count: cc[club]};
      y += h + BAR_GAP;
    });
    if (hasNoData) {
      blockPos[season][NO_DATA] = {y0: y, h: NO_DATA_H, count: cc[NO_DATA]};
    }
  });

  // ── 5. Render SVG ─────────────────────────────────────────────────
  var flowSVG  = '';
  var labelSVG = '';   // count labels, hidden until hover
  var blockSVG = '';
  var lastSeason = SEASONS[SEASONS.length - 1];

  // Draw flows first (behind blocks)
  for (var i = 0; i < SEASONS.length - 1; i++) {
    var s1 = SEASONS[i], s2 = SEASONS[i+1];
    var x1   = seasonX[s1] + BAR_W;
    var x2   = seasonX[s2];
    var midX = (x1 + x2) / 2;

    if (!blockPos[s1] || !blockPos[s2]) continue;

    // Initialise running y-offsets for source (right side) and target (left side)
    var srcOff = {}, tgtOff = {};
    Object.keys(blockPos[s1]).forEach(function(c){ srcOff[c] = blockPos[s1][c].y0; });
    Object.keys(blockPos[s2]).forEach(function(c){ tgtOff[c] = blockPos[s2][c].y0; });

    // Collect flows for this transition, sort same-club first then by source club
    var fflows = Object.keys(flowMap)
      .map(function(k){ return flowMap[k]; })
      .filter(function(f){ return f.fromSeason===s1 && f.toSeason===s2 && f.count>=minFlow; })
      .sort(function(a,b){
        var sameA = a.fromClub===a.toClub ? 0 : 1;
        var sameB = b.fromClub===b.toClub ? 0 : 1;
        return sameA - sameB || a.fromClub.localeCompare(b.fromClub) || a.toClub.localeCompare(b.toClub);
      });

    fflows.forEach(function(f) {
      var sb = blockPos[s1][f.fromClub];
      var tb = blockPos[s2][f.toClub];
      if (!sb || !tb) return;

      var srcFrac = f.count / sb.count;
      var tgtFrac = f.count / tb.count;
      var srcH = sb.h * srcFrac;
      var tgtH = tb.h * tgtFrac;

      var sy0 = srcOff[f.fromClub];
      var sy1 = sy0 + srcH;
      var ty0 = tgtOff[f.toClub];
      var ty1 = ty0 + tgtH;

      srcOff[f.fromClub] += srcH;
      tgtOff[f.toClub]   += tgtH;

      var col    = clubColor[f.fromClub] || '#888';
      var isSame = f.fromClub === f.toClub;
      var opac   = isSame ? 0.22 : 0.42;

      // Positions just outside each block edge, in the ribbon space
      var labelXSrc = Math.round(x1 + 6);            // just right of source block, in ribbon
      var labelYSrc = Math.round((sy0 + sy1) / 2);  // mid of source ribbon slice
      var labelXTgt = Math.round(x2 - 6);            // just left of target block, in ribbon
      var labelYTgt = Math.round((ty0 + ty1) / 2);  // mid of target ribbon slice

      flowSVG += '<path class="flow-path"'
               +' data-from="'+escAttr(f.fromClub)+'" data-froms="'+s1+'"'
               +' data-to="'+escAttr(f.toClub)+'" data-tos="'+s2+'"'
               +' data-opac="'+opac+'"'
               +' d="M'+x1+','+sy0+' C'+midX+','+sy0+' '+midX+','+ty0+' '+x2+','+ty0
               +' L'+x2+','+ty1+' C'+midX+','+ty1+' '+midX+','+sy1+' '+x1+','+sy1+' Z"'
               +' fill="'+col+'" opacity="'+opac+'">'
               +'<title>'+escHtml(f.fromClub)+' → '+escHtml(f.toClub)+': '+f.count+' player'+(f.count!==1?'s':'')+'</title>'
               +'</path>';

      // Compute the intersection player list for this specific flow (used by click when focused)
      var _fromP = ((blockPlayers[s1]||{})[f.fromClub]||[]);
      var _toSet = {}; ((blockPlayers[s2]||{})[f.toClub]||[]).forEach(function(p){_toSet[p]=true;});
      var _flowP = _fromP.filter(function(p){return _toSet[p];}).slice().sort();

      labelSVG += '<text class="flow-label"'
                +' data-from="'+escAttr(f.fromClub)+'" data-froms="'+s1+'"'
                +' data-to="'+escAttr(f.toClub)+'" data-tos="'+s2+'"'
                +' data-xsrc="'+labelXSrc+'" data-ysrc="'+labelYSrc+'"'
                +' data-xtgt="'+labelXTgt+'" data-ytgt="'+labelYTgt+'"'
                +' data-players="'+escHtml(JSON.stringify(_flowP))+'"'
                +' x="'+labelXTgt+'" y="'+labelYTgt+'"'
                +' text-anchor="middle" dominant-baseline="middle"'
                +' fill="#fff" font-size="11" font-weight="800"'
                +' font-family="\'Segoe UI\',system-ui,sans-serif"'
                +' style="pointer-events:none;display:none;'
                +   'filter:drop-shadow(0 1px 2px rgba(0,0,0,.55))">'
                +f.count+'</text>';
    });
  }

  // Draw club blocks + per-block total-count labels (shown on right-side hover)
  var totalSVG = '';
  SEASONS.forEach(function(season) {
    var x = seasonX[season];
    blockSVG += '<text x="'+(x+BAR_W/2)+'" y="'+(PT-14)+'" text-anchor="middle"'
              +' fill="#8890b0" font-size="12" font-weight="600"'
              +' font-family="\'Segoe UI\',system-ui,sans-serif">'
              +escHtml(SEASON_LABELS[season])+'</text>';

    if (!blockPos[season]) return;
    Object.keys(blockPos[season]).forEach(function(club) {
      var bp      = blockPos[season][club];
      var col     = clubColor[club] || '#888';
      var isNoData = (club === NO_DATA);
      blockSVG += '<g class="club-group" data-club="'+escAttr(club)+'" data-season="'+season+'"'
                +' data-players="'+escHtml(JSON.stringify(((blockPlayers[season]||{})[club]||[]).slice().sort()))+'"'
                + (isNoData ? ' style="cursor:default"' : ' style="cursor:pointer"') + '>';
      blockSVG += '<rect class="club-block" data-club="'+escAttr(club)+'" data-season="'+season+'"'
                +' x="'+x+'" y="'+bp.y0+'" width="'+BAR_W+'" height="'+Math.max(bp.h,2)+'"'
                +' rx="3" fill="'+col+'" opacity="'+(isNoData?'0.45':'0.88')+'"'
                +(isNoData?' stroke="#888" stroke-width="1" stroke-dasharray="4,3"':'')+'>'
                +'<title>'+(isNoData?'No data':escHtml(club))+' ('+SEASON_LABELS[season]+'): '+bp.count+' players</title>'
                +'</rect>';
      if (bp.h >= 14) {
        var label = isNoData ? 'No Data' : abbr(club);
        var fs    = bp.h >= 22 ? 10 : 8;
        var maxW  = BAR_W - 10;
        // Show specific-team tag below club name for the primary season block
        var teamTag = '';
        if (!isNoData && teamFilter && season === primarySeason
            && teamFilter.toLowerCase().indexOf(club.toLowerCase()) === 0) {
          teamTag = teamFilter.slice(club.length).trim();
        }
        var showTag = teamTag && bp.h >= 22;
        var labelY  = showTag ? bp.y0 + bp.h / 2 - 6 : bp.y0 + bp.h / 2;
        var natW    = label.length * fs * 0.62;
        var tlAttr  = natW > maxW ? ' textLength="'+maxW+'" lengthAdjust="spacingAndGlyphs"' : '';
        blockSVG += '<text x="'+(x+BAR_W/2)+'" y="'+labelY+'"'
                  +' text-anchor="middle" dominant-baseline="middle"'
                  +' fill="#fff" font-size="'+fs+'" font-weight="700"'
                  +' font-family="\'Segoe UI\',system-ui,sans-serif"'
                  +' style="pointer-events:none"'+tlAttr+'>'
                  +escHtml(label)+'</text>';
        if (showTag) {
          var tagY  = bp.y0 + bp.h / 2 + 7;
          var tagW  = teamTag.length * 8 * 0.62;
          var tagTL = tagW > maxW ? ' textLength="'+maxW+'" lengthAdjust="spacingAndGlyphs"' : '';
          blockSVG += '<text x="'+(x+BAR_W/2)+'" y="'+tagY+'"'
                    +' text-anchor="middle" dominant-baseline="middle"'
                    +' fill="rgba(255,255,255,0.72)" font-size="8" font-weight="500"'
                    +' font-family="\'Segoe UI\',system-ui,sans-serif"'
                    +' style="pointer-events:none"'+tagTL+'>'
                    +escHtml(teamTag)+'</text>';
        }
      }
      blockSVG += '</g>';

      // Hidden total-count label — stores both left & right positions for hover
      var midY = Math.round(bp.y0 + bp.h / 2);
      var tlCommon = ' data-club="'+escAttr(club)+'" data-season="'+season+'"'
                   +' data-xleft="'+(x-6)+'" data-xright="'+(x+BAR_W+6)+'" data-ymid="'+midY+'"'
                   +' dominant-baseline="middle" fill="#fff" font-size="11" font-weight="800"'
                   +' font-family="\'Segoe UI\',system-ui,sans-serif"'
                   +' style="pointer-events:none;display:none;filter:drop-shadow(0 1px 2px rgba(0,0,0,.55))"';
      // Right-side total (shown for source or middle club)
      totalSVG += '<text class="block-total-label block-total-right"'
                + tlCommon
                +' x="'+(x+BAR_W+6)+'" y="'+midY+'" text-anchor="start">'
                +bp.count+'</text>';
      // Left-side total (shown for destination or middle club)
      totalSVG += '<text class="block-total-label block-total-left"'
                + tlCommon
                +' x="'+(x-6)+'" y="'+midY+'" text-anchor="end">'
                +bp.count+'</text>';
    });
  });

  container.innerHTML = '<svg data-last-season="'+lastSeason+'" data-no-data="'+escAttr(NO_DATA)+'" data-primary-season="'+primarySeason+'" width="'+W+'" height="'+H+'" style="display:block;max-width:100%;">'
                      + flowSVG + labelSVG + blockSVG + totalSVG + '</svg>';

  // ── 5b. Click interactivity ────────────────────────────────────────
  var svg = container.querySelector('svg');

  // Mouseover: show hovered club's total + individual counts at opposite-side clubs
  svg.querySelectorAll('.club-group').forEach(function(g) {
    g.addEventListener('mouseenter', function() {
      var club   = g.dataset.club;
      var season = g.dataset.season;

      // Determine column role
      var hasOutgoing = !!svg.querySelector('.flow-label[data-from="'+club+'"][data-froms="'+season+'"]');
      var hasIncoming = !!svg.querySelector('.flow-label[data-to="'+club+'"][data-tos="'+season+'"]');
      var isMiddle    = hasOutgoing && hasIncoming;

      var focusClub = document.getElementById('mig-focus-club').value;

      // Show the appropriate total label(s) for this club
      svg.querySelectorAll('.block-total-label').forEach(function(t) {
        if (t.dataset.club !== club || t.dataset.season !== season) {
          t.style.display = 'none';
          return;
        }
        t.setAttribute('y', t.dataset.ymid);
        var isRight = t.classList.contains('block-total-right');
        var isLeft  = t.classList.contains('block-total-left');
        if (isMiddle) {
          // Middle club: show total on BOTH sides
          t.style.display = '';
        } else if (hasOutgoing && isRight && !(focusClub && !isMiddle)) {
          // Source (left) club: total on right side only (suppressed when a focus club is active)
          t.style.display = '';
        } else if (!hasOutgoing && isLeft && !(focusClub && !isMiddle && club !== focusClub)) {
          // Destination (right) club: total on left side only (suppressed when focus club is the source)
          t.style.display = '';
        } else {
          t.style.display = 'none';
        }
      });

      // Show individual flow counts; collect active keys
      var activeClub = {};
      var activeRibbon = {};
      activeClub[club + '|' + season] = true;

      // When a focus club is active and this is a source block, update the rect <title> to show
      // only the flow count toward the focused club (avoids the native tooltip showing the full block total).
      var blockRect = g.querySelector('rect.club-block');
      if (blockRect) {
        var blockTitleEl = blockRect.querySelector('title');
        if (blockTitleEl) blockTitleEl._origText = blockTitleEl._origText || blockTitleEl.textContent;
        if (hasOutgoing && !isMiddle && focusClub && blockTitleEl) {
          // Source block: title → "thisClub → focusClub: N players"
          var focusFlowLabel = svg.querySelector('.flow-label[data-from="'+club+'"][data-froms="'+season+'"][data-to="'+focusClub+'"]');
          if (focusFlowLabel) {
            var n = parseInt(focusFlowLabel.textContent.trim());
            blockTitleEl.textContent = clubDisplayName(club) + ' → ' + clubDisplayName(focusClub)
                                     + ': ' + n + ' player' + (n !== 1 ? 's' : '');
          }
        } else if (hasIncoming && !isMiddle && focusClub && club !== focusClub && blockTitleEl) {
          // Destination block: title → "focusClub → thisClub: N players"
          var focusFlowLabel = svg.querySelector('.flow-label[data-from="'+focusClub+'"][data-to="'+club+'"][data-tos="'+season+'"]');
          if (focusFlowLabel) {
            var n = parseInt(focusFlowLabel.textContent.trim());
            blockTitleEl.textContent = clubDisplayName(focusClub) + ' → ' + clubDisplayName(club)
                                     + ': ' + n + ' player' + (n !== 1 ? 's' : '');
          }
        }
      }

      svg.querySelectorAll('.flow-label').forEach(function(t) {
        // Source block with a focus club active: show only the count going to the focused club,
        // positioned at the right edge of the source block (mirrors the destination-hover style).
        if (hasOutgoing && !isMiddle && focusClub && t.dataset.from === club && t.dataset.froms === season) {
          if (t.dataset.to === focusClub) {
            t.setAttribute('x', t.dataset.xsrc);
            t.setAttribute('y', t.dataset.ysrc);
            t.setAttribute('text-anchor', 'start');
            t.style.display = '';
            activeClub[t.dataset.to + '|' + t.dataset.tos] = true;
            activeRibbon[t.dataset.from+'|'+t.dataset.froms+'|'+t.dataset.to+'|'+t.dataset.tos] = true;
          } else {
            t.style.display = 'none';
          }
        }
        // Outgoing flows (no focus): show count near left edge of destination block
        else if (hasOutgoing && t.dataset.from === club && t.dataset.froms === season) {
          t.setAttribute('x', t.dataset.xtgt);
          t.setAttribute('y', t.dataset.ytgt);
          t.setAttribute('text-anchor', 'end');
          t.style.display = '';
          activeClub[t.dataset.to + '|' + t.dataset.tos] = true;
          activeRibbon[t.dataset.from+'|'+t.dataset.froms+'|'+t.dataset.to+'|'+t.dataset.tos] = true;
        }
        // Destination block with a focus club active as source: show only the count from focusClub,
        // positioned at the left edge of the destination block (mirrors the source-hover style).
        else if (hasIncoming && !isMiddle && focusClub && club !== focusClub && t.dataset.to === club && t.dataset.tos === season) {
          if (t.dataset.from === focusClub) {
            t.setAttribute('x', t.dataset.xtgt);
            t.setAttribute('y', t.dataset.ytgt);
            t.setAttribute('text-anchor', 'end');
            t.style.display = '';
            activeClub[t.dataset.from + '|' + t.dataset.froms] = true;
            activeRibbon[t.dataset.from+'|'+t.dataset.froms+'|'+t.dataset.to+'|'+t.dataset.tos] = true;
          } else {
            t.style.display = 'none';
          }
        }
        // Incoming flows (no focus): show count near right edge of source block
        else if (hasIncoming && t.dataset.to === club && t.dataset.tos === season) {
          t.setAttribute('x', t.dataset.xsrc);
          t.setAttribute('y', t.dataset.ysrc);
          t.setAttribute('text-anchor', 'start');
          t.style.display = '';
          activeClub[t.dataset.from + '|' + t.dataset.froms] = true;
          activeRibbon[t.dataset.from+'|'+t.dataset.froms+'|'+t.dataset.to+'|'+t.dataset.tos] = true;
        } else {
          t.style.display = 'none';
        }
      });

      // Dim club blocks and ribbons that aren't part of the active set
      svg.querySelectorAll('.club-group').forEach(function(other) {
        var key = other.dataset.club + '|' + other.dataset.season;
        other.style.opacity = activeClub[key] ? '1' : '0.15';
      });
      svg.querySelectorAll('.flow-path').forEach(function(p) {
        var key = p.dataset.from+'|'+p.dataset.froms+'|'+p.dataset.to+'|'+p.dataset.tos;
        p.setAttribute('opacity', activeRibbon[key] ? '0.75' : '0.04');
      });
    });
    g.addEventListener('mouseleave', function() {
      svg.querySelectorAll('.flow-label').forEach(function(t) { t.style.display = 'none'; });
      svg.querySelectorAll('.block-total-label').forEach(function(t) { t.style.display = 'none'; });
      svg.querySelectorAll('.club-group').forEach(function(other) { other.style.opacity = '1'; });
      svg.querySelectorAll('.flow-path').forEach(function(p) { p.setAttribute('opacity', p.dataset.opac); });
      // Restore any block rect title we overwrote on mouseenter
      var blockRect = g.querySelector('rect.club-block');
      if (blockRect) {
        var blockTitleEl = blockRect.querySelector('title');
        if (blockTitleEl && blockTitleEl._origText) blockTitleEl.textContent = blockTitleEl._origText;
      }
    });
  });

  // Click a block → show player list popup only (no dropdown changes or re-render)
  svg.querySelectorAll('.club-group').forEach(function(g) {
    g.addEventListener('click', function(ev) {
      ev.stopPropagation();
      var club    = g.dataset.club;
      var season  = parseInt(g.dataset.season);
      var NO_DATA = svg.dataset.noData;
      var focusClub = document.getElementById('mig-focus-club').value;

      // When a focus club is set and we click a source block, show only the
      // players who flowed from this club into the focused destination club.
      var hasOut = !!svg.querySelector('.flow-label[data-from="'+club+'"][data-froms="'+season+'"]');
      var hasIn  = !!svg.querySelector('.flow-label[data-to="'+club+'"][data-tos="'+season+'"]');
      var isSource      = hasOut && !hasIn;
      var isDestination = hasIn  && !hasOut && club !== focusClub;

      if (focusClub && isSource) {
        var flowLabel = svg.querySelector('.flow-label[data-from="'+club+'"][data-froms="'+season+'"][data-to="'+focusClub+'"]');
        if (flowLabel) {
          var names = JSON.parse(flowLabel.dataset.players || '[]');
          var label = clubDisplayName(club) + ' → ' + clubDisplayName(focusClub);
          migShowPlayerPopup(names, label, SEASON_LABELS[season] + ' → ' + SEASON_LABELS[parseInt(flowLabel.dataset.tos)], ev);
          return;
        }
      }

      // When a focus club is set and we click a destination block, show only the
      // players who flowed from the focused source club into this destination.
      if (focusClub && isDestination) {
        var flowLabel = svg.querySelector('.flow-label[data-from="'+focusClub+'"][data-to="'+club+'"][data-tos="'+season+'"]');
        if (flowLabel) {
          var names = JSON.parse(flowLabel.dataset.players || '[]');
          var label = clubDisplayName(focusClub) + ' → ' + clubDisplayName(club);
          migShowPlayerPopup(names, label, SEASON_LABELS[parseInt(flowLabel.dataset.froms)] + ' → ' + SEASON_LABELS[season], ev);
          return;
        }
      }

      var names = JSON.parse(g.dataset.players || '[]');
      migShowPlayerPopup(names, club === NO_DATA ? 'No Data' : clubDisplayName(club), SEASON_LABELS[season], ev);
    });
  });

  // Focus is set/cleared via the Club dropdown only (not via block clicks)

  // ── 6. Legend ─────────────────────────────────────────────────────
  var activeSeason = Object.keys(seasonClubCounts);
  var legendClubs  = allClubs.filter(function(c) {
    return activeSeason.some(function(s){ return seasonClubCounts[s] && seasonClubCounts[s][c]; });
  });
  var legendHTML = '<div style="display:flex;flex-wrap:wrap;gap:8px;padding:10px 0;">';
  legendClubs.forEach(function(c) {
    legendHTML += '<span style="display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--text);">'
                + '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:'+clubColor[c]+';flex-shrink:0;"></span>'
                + escHtml(clubDisplayName(c))+'</span>';
  });
  legendHTML += '</div>';
  legendEl.innerHTML = legendHTML;
}

</script>

<script>
// ── Auto-fetch latest data from GitHub ──
(function() {
  var GITHUB_JSON_URL = 'https://raw.githubusercontent.com/lamfalus/norcal-hockey/main/norcal_hockey_players_s27-s31.json';

  var CLUB_CANONICAL = {
    'Tri-Valley Blue Devils': 'Tri Valley Blue Devils',
    'San Mateo Blackstars':   'San Mateo Black Stars'
  };
  var CLUB_PREFIXES = [
    'San Jose Jr Sharks Girls','San Jose Jr Sharks',
    'Tri Valley Lady Blue Devils','Tri Valley Blue Devils',
    'Tri-Valley Lady Blue Devils','Tri-Valley Blue Devils','Tri-Valley Bulls',
    'Santa Clara Blackhawks','Santa Rosa Flyers','San Francisco Sabercats',
    'San Mateo Black Stars','Cupertino Cougars','Oakland Bears',
    'Vacaville Jets','Capital Thunder','Stockton Colts Girls','Stockton Colts',
    'Lake Tahoe Grizzlies','Reno Ice','Fresno Jr Monsters','Golden State Elite'
  ].sort(function(a,b){return b.length-a.length;});
  function normalizeTeam(t) { return (t||'').replace(/\s+/g,' ').trim(); }
  function extractClub(teamName) {
    var norm = normalizeTeam(teamName);
    for (var variant in CLUB_CANONICAL) {
      if (norm.toLowerCase().indexOf(variant.toLowerCase()) === 0) {
        norm = CLUB_CANONICAL[variant] + norm.slice(variant.length); break;
      }
    }
    for (var i = 0; i < CLUB_PREFIXES.length; i++) {
      if (norm.toLowerCase().indexOf(CLUB_PREFIXES[i].toLowerCase()) === 0) return CLUB_PREFIXES[i];
    }
    var parts = norm.split(' ');
    return parts.length > 1 ? parts.slice(0,-1).join(' ') : norm;
  }

  function applyData(playersObj) {
    // Normalize names: collapse double-spaces, strip middle initials, merge duplicates
    var normObj = {};
    for (var name in playersObj) {
      var norm = normalizeName(name);
      if (!normObj[norm]) normObj[norm] = [];
      normObj[norm] = normObj[norm].concat(playersObj[name]);
    }
    playersObj = normObj;
    var newEntries = [];
    for (var name in playersObj) {
      var entries = playersObj[name];
      for (var i = 0; i < entries.length; i++) {
        newEntries.push(Object.assign({playerName: name, source: 'norcal'}, entries[i]));
      }
    }
    // Parse NorCal team names (same logic as initial load)
    var reDiv = /\s(\d{2}[A-Z]*)(-\d+)?$/;
    newEntries.forEach(function(e) {
      if (!e.division && e.team) {
        var m = e.team.match(reDiv);
        if (m) {
          e.division = m[1] || null;
          var club = e.team.slice(0, -m[0].length);
          if (m[2]) e.teamBase = club + ' ' + m[1] + m[2];
        }
      }
      e.club = extractClub(e.team);
    });
    window.ALL_ENTRIES = newEntries;
    window.RAW = playersObj;
    window.ALL_PLAYER_NAMES = Object.keys(playersObj).sort();
    // Rebuild COMBINED_RAW NorCal portion (preserves any already-merged CAHA entries)
    var newCombined = {};
    Object.keys(playersObj).forEach(function(name) {
      newCombined[name] = playersObj[name].map(function(e){ return Object.assign({source:'norcal'}, e); });
    });
    // Re-add any existing CAHA entries
    Object.keys(window.COMBINED_RAW || {}).forEach(function(name) {
      (window.COMBINED_RAW[name] || []).forEach(function(e) {
        if (e.source === 'caha') {
          if (!newCombined[name]) newCombined[name] = [];
          newCombined[name].push(e);
        }
      });
    });
    window.COMBINED_RAW = newCombined;
    var newMap = {};
    for (var i = 0; i < newEntries.length; i++) {
      var e = newEntries[i];
      var club = e.club;
      var normTeam = normalizeTeam(e.team);
      if (!newMap[club]) newMap[club] = new Set();
      newMap[club].add(normTeam);
    }
    window.CLUB_TEAM_MAP = newMap;
    window.ALL_CLUBS = Object.keys(newMap).sort((a,b)=>clubDisplayName(a).localeCompare(clubDisplayName(b)));

    var SEASON_LABELS = {27:"'21-'22",28:"'22-'23",29:"'23-'24",30:"'24-'25",31:"'25-'26"};
    var SEASONS = [27,28,29,30,31];
    var selSeason = document.getElementById('sel-season');
    selSeason.innerHTML = '<option value="">— select —</option>';
    SEASONS.forEach(function(s) {
      var o = document.createElement('option');
      o.value = s; o.textContent = SEASON_LABELS[s];
      selSeason.appendChild(o);
    });
    selSeason.value = SEASONS[SEASONS.length - 1];

    var selClub = document.getElementById('sel-club');
    selClub.innerHTML = '<option value="">— select a club —</option>';
    window.ALL_CLUBS.forEach(function(c) {
      var o = document.createElement('option');
      o.value = c; o.textContent = clubDisplayName(c);
      selClub.appendChild(o);
    });
    var selClubSeason = document.getElementById('sel-club-season');
    selClubSeason.innerHTML = '<option value="">— all seasons —</option>';
    SEASONS.forEach(function(s) {
      var o = document.createElement('option');
      o.value = s; o.textContent = SEASON_LABELS[s];
      selClubSeason.appendChild(o);
    });

    // Re-merge CAHA data if it already loaded before this NorCal refresh
    if (window.CAHA_ENTRIES && window.CAHA_ENTRIES.length) {
      window.ALL_ENTRIES = window.ALL_ENTRIES.concat(window.CAHA_ENTRIES);
      // Rebuild CLUB_TEAM_MAP to include CAHA clubs
      window.CAHA_ENTRIES.forEach(function(e) {
        var club = e.club;
        var normTeam = normalizeTeam(e.teamBase || e.team);
        if (!window.CLUB_TEAM_MAP[club]) window.CLUB_TEAM_MAP[club] = new Set();
        window.CLUB_TEAM_MAP[club].add(normTeam);
        // Update COMBINED_RAW
        var name = e.playerName;
        if (!window.COMBINED_RAW[name]) window.COMBINED_RAW[name] = [];
        var already = window.COMBINED_RAW[name].some(function(x){ return x.source==='caha' && x.season===e.season && x.team===e.team; });
        if (!already) window.COMBINED_RAW[name].push(e);
      });
      window.ALL_CLUBS = Object.keys(window.CLUB_TEAM_MAP).sort((a,b)=>clubDisplayName(a).localeCompare(clubDisplayName(b)));
      // Rebuild sel-club dropdown with CAHA clubs included
      var selClub2 = document.getElementById('sel-club');
      selClub2.innerHTML = '<option value="">— select a club —</option>';
      window.ALL_CLUBS.forEach(function(c) {
        var o = document.createElement('option');
        o.value = c; o.textContent = clubDisplayName(c);
        selClub2.appendChild(o);
      });
    }
    if (typeof refreshBirthYears === 'function') refreshBirthYears();
    selSeason.dispatchEvent(new Event('change'));
  }

  // Try relative path first (local server), then GitHub raw
  var norcalUrls = [
    'norcal_hockey_players_s27-s31.json',
    GITHUB_JSON_URL
  ];
  function tryNorcalFetch(urlList) {
    if (!urlList.length) return;
    fetch(urlList[0])
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function(parsed) {
        var playersObj = parsed.players || parsed;
        if (typeof playersObj !== 'object' || Array.isArray(playersObj)) return;
        applyData(playersObj);
      })
      .catch(function() {
        tryNorcalFetch(urlList.slice(1));
      });
  }
  tryNorcalFetch(norcalUrls);
})();
</script>

<script>
// ── Load CAHA stats data ──────────────────────────────────────────────────
(function() {
  // Map raw CAHA club name → canonical club name (matches NorCal where same org)
  var CAHA_CLUB_ALIASES = {
    'Jr. Sharks':        'San Jose Jr Sharks',
    'Jr. Sharks Girls':  'San Jose Jr Sharks Girls',
    'Blackhawks':        'Santa Clara Blackhawks',
    'Oakland Bears':     'Oakland Bears',
    'Lady Blue Devils':  'Tri Valley Lady Blue Devils',
    'GSE':               'Golden State Elite',
  };

  function normDiv(div) {
    var m = (div||'').match(/^(\d+)U(?:\/\d+U)?\s+(Boys|Girls)\s+(?:(\d+)O\s+)?(.+)$/);
    if (!m) return div;
    var ageU=parseInt(m[1]),gender=m[2],overage=m[3]?parseInt(m[3]):null,tier=m[4].trim();
    var age=ageU;
    if(tier==='AAA Major'){tier='AAA';}
    else if(tier==='AAA Minor'){tier='AAA';age=ageU-1;}
    else if(overage){age=overage;}
    return gender==='Boys'?age+tier:'Girls '+age+tier;
  }

  function normCahaName(name) {
    return (name||'').replace(/\s+/g,' ').trim()
      .replace(/\s[A-Z]\.?\s/g,' ')
      .replace(/\s[A-Z]\.?$/,'');
  }

  function mergeCahaData(playersObj) {
    // Normalize names
    var normObj = {};
    for (var rawName in playersObj) {
      var norm = normCahaName(rawName);
      if (!normObj[norm]) normObj[norm] = [];
      normObj[norm] = normObj[norm].concat(playersObj[rawName]);
    }

    var newEntries = [];
    for (var name in normObj) {
      normObj[name].forEach(function(e) {
        var baseTeam = (e.team||'').replace(/-\d+$/, '').trim();
        var club = CAHA_CLUB_ALIASES[baseTeam] || baseTeam;
        // Build teamBase = "Jr. Kings 14AAA", "Jr. Kings 14AA-1", "Jr. Kings 14AA-2"
        // so the club view can split teams by division, and teamSuffix() shows "14AAA"/"14AA-1"
        var normD = normDiv(e.division || '');
        var subNum = (e.team||'').match(/-(\d+)$/);
        var subSuffix = subNum ? '-' + subNum[1] : '';
        var teamBase = baseTeam + (normD ? ' ' + normD : '') + subSuffix;
        var entry = Object.assign({}, e, {
          playerName: name,
          source:     'caha',
          division:   normD,
          club:       club,
          teamBase:   teamBase,
        });
        newEntries.push(entry);
      });
    }

    // Cache CAHA entries globally so applyData can re-merge them if it runs after us
    window.CAHA_ENTRIES = newEntries;

    // Merge into ALL_ENTRIES
    var existing = (window.ALL_ENTRIES || []).filter(function(e){ return e.source !== 'caha'; });
    window.ALL_ENTRIES = existing.concat(newEntries);

    // Merge into COMBINED_RAW
    var cr = window.COMBINED_RAW || {};
    for (var name in normObj) {
      if (!cr[name]) cr[name] = (window.RAW && window.RAW[name]
        ? window.RAW[name].map(function(e){ return Object.assign({source:'norcal'}, e); })
        : []);
      normObj[name].forEach(function(e) {
        var baseTeam = (e.team||'').replace(/-\d+$/, '').trim();
        var club = CAHA_CLUB_ALIASES[baseTeam] || baseTeam;
        var normD = normDiv(e.division || '');
        var subNum = (e.team||'').match(/-(\d+)$/);
        var subSuffix = subNum ? '-' + subNum[1] : '';
        cr[name].push(Object.assign({}, e, {
          source:   'caha',
          division: normD,
          club:     club,
          teamBase: baseTeam + (normD ? ' ' + normD : '') + subSuffix,
        }));
      });
    }
    window.COMBINED_RAW = cr;

    // Rebuild CLUB_TEAM_MAP to include CAHA clubs
    var clubMap = window.CLUB_TEAM_MAP || {};
    newEntries.forEach(function(e) {
      var club = e.club;
      var t = (e.teamBase||e.team||'').replace(/\s+/g,' ').trim();
      if (!clubMap[club]) clubMap[club] = new Set();
      clubMap[club].add(t);
    });
    window.CLUB_TEAM_MAP = clubMap;
    window.ALL_CLUBS = Object.keys(clubMap).sort((a,b)=>clubDisplayName(a).localeCompare(clubDisplayName(b)));

    // Update player name list
    window.ALL_PLAYER_NAMES = Object.keys(cr).sort();

    // Rebuild the club selector with new CAHA clubs
    var selClub = document.getElementById('sel-club');
    if (selClub) {
      var currentVal = selClub.value;
      selClub.innerHTML = '<option value="">— select a club —</option>';
      window.ALL_CLUBS.forEach(function(c) {
        var o = document.createElement('option');
        o.value = c; o.textContent = clubDisplayName(c);
        selClub.appendChild(o);
      });
      if (currentVal) selClub.value = currentVal;
    }

    if (typeof refreshBirthYears === 'function') refreshBirthYears();
    // Refresh the Browse sub-filter and content now that CAHA data is available
    if (typeof onSeasonChange === 'function') onSeasonChange();
    console.log('CAHA: merged ' + newEntries.length + ' entries, '
      + Object.keys(normObj).length + ' players');
  }

  // Try relative path first (local server), then GitHub raw
  var urls = [
    'caha_players_s27-s31.json',
    'https://raw.githubusercontent.com/lamfalus/norcal-hockey/main/caha_players_s27-s31.json'
  ];

  function tryFetch(urlList) {
    if (!urlList.length) return;
    fetch(urlList[0])
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function(parsed) {
        var players = parsed.players || parsed;
        if (typeof players === 'object' && !Array.isArray(players)) {
          mergeCahaData(players);
        }
      })
      .catch(function() {
        tryFetch(urlList.slice(1));
      });
  }

  tryFetch(urls);
})();
</script>
